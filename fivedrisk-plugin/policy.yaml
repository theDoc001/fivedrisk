# 5D Risk Governance Engine — Plugin Default Policy
# 4-band system (GREEN / YELLOW / ORANGE / RED)

version: "0.1.0"

# 4-Band normalized score thresholds (§12.4)
bands:
  yellow_score: 1.0    # Moderate risk
  orange_score: 1.8    # High risk, mandatory approval
  red_score: 2.5       # Critical, deny by default

# Single-axis spike thresholds
thresholds:
  red_threshold: 4         # any dim >= this → RED
  orange_threshold: 3      # any dim >= this → ORANGE

weights:
  data_sensitivity: 1.0
  tool_privilege: 1.2      # privilege escalation is dangerous
  reversibility: 1.5       # irreversible is always worse
  external_impact: 1.0
  autonomy_context: 0.8    # oversight modifies, doesn't dominate

# Tool classification baselines
tool_defaults:
  Read:
    tool_privilege: 0
    reversibility: 0
    external_impact: 0
  Glob:
    tool_privilege: 0
    reversibility: 0
    external_impact: 0
  Grep:
    tool_privilege: 0
    reversibility: 0
    external_impact: 0
  Edit:
    tool_privilege: 1
    reversibility: 1
    external_impact: 0
  Write:
    tool_privilege: 1
    reversibility: 1
    external_impact: 0
  Bash:
    tool_privilege: 2
    reversibility: 2
    external_impact: 1
  WebFetch:
    tool_privilege: 1
    reversibility: 0
    external_impact: 1
  WebSearch:
    tool_privilege: 0
    reversibility: 0
    external_impact: 0

# Bash command-specific overrides (regex patterns)
bash_overrides:
  "rm -rf":
    tool_privilege: 4
    reversibility: 4
  "docker":
    tool_privilege: 3
    reversibility: 2
  "git push --force":
    tool_privilege: 3
    reversibility: 4
  "curl.*POST":
    tool_privilege: 2
    external_impact: 3
  "pip install":
    tool_privilege: 2
    reversibility: 1
